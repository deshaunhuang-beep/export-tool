name: Build Windows EXE

on:
  push:
    branches: [ "main" ]  # 当你推送代码到 main 分支时触发
  workflow_dispatch:      # 允许你在 GitHub 页面上点击按钮手动触发

jobs:
  build:
    runs-on: windows-latest  # 关键点：使用 GitHub 提供的 Windows 虚拟机

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pymongo pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --console --name="运营数据自动化导出工具" mongodb_multi_exporter.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Export-Tool-EXE  # 下载时的压缩包名称
        path: dist/运营数据自动化导出工具.exe # 打包出来的文件路径

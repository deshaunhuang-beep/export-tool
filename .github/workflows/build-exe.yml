name: Build Windows and Mac Apps

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # 任务 1：打包 Windows 版本
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pymongo pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --console --name="运营数据导出工具_Win" mongodb_multi_exporter.py

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: 运营数据导出工具_Windows版
        path: dist/运营数据导出工具_Win.exe

  # 任务 2：打包 Mac 版本
  build-macos:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pymongo pyinstaller

    - name: Build Mac Executable
      run: |
        pyinstaller --onefile --console --name="运营数据导出工具_Mac" mongodb_multi_exporter.py

    - name: Upload Mac Artifact
      uses: actions/upload-artifact@v4
      with:
        name: 运营数据导出工具_Mac版
        path: dist/运营数据导出工具_Mac
